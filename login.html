<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>LGPR — Login</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&family=Orbitron:wght@700;900&family=Exo+2:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --blue:   #1e6fff;
    --purple: #7c3aed;
    --red:    #e11d48;
    --dark:   #07070f;
    --card:   #10101e;
    --border: #2a2a4a;
    --text:   #e8e8ff;
    --muted:  #7070a0;
    --glow-b: 0 0 18px #1e6fff88;
    --glow-p: 0 0 18px #7c3aed88;
    --glow-r: 0 0 18px #e11d4888;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--dark);
    color: var(--text);
    font-family: 'Exo 2', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }

  /* Background grid */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image:
      linear-gradient(rgba(30,111,255,.07) 1px, transparent 1px),
      linear-gradient(90deg, rgba(30,111,255,.07) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  /* Ambient orbs */
  .orb {
    position: fixed;
    border-radius: 50%;
    filter: blur(80px);
    opacity: 0.25;
    pointer-events: none;
    z-index: 0;
    animation: float 8s ease-in-out infinite;
  }
  .orb1 { width:400px;height:400px;background:var(--purple);top:-100px;left:-100px; }
  .orb2 { width:350px;height:350px;background:var(--blue);bottom:-80px;right:-80px;animation-delay:-4s; }
  .orb3 { width:250px;height:250px;background:var(--red);bottom:30%;left:60%;animation-delay:-2s; }
  @keyframes float {
    0%,100% { transform: translateY(0) scale(1); }
    50%      { transform: translateY(-30px) scale(1.05); }
  }

  /* Logo */
  .logo {
    position: relative; z-index: 1;
    text-align: center;
    margin-bottom: 32px;
  }
  .logo h1 {
    font-family: 'Orbitron', monospace;
    font-size: clamp(28px, 5vw, 46px);
    font-weight: 900;
    letter-spacing: 4px;
    background: linear-gradient(90deg, var(--blue), var(--purple), var(--red));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    text-shadow: none;
    filter: drop-shadow(0 0 16px #7c3aed66);
  }
  .logo p {
    font-family: 'Rajdhani', sans-serif;
    color: var(--muted);
    letter-spacing: 6px;
    font-size: 12px;
    text-transform: uppercase;
    margin-top: 6px;
  }

  /* Role selector */
  .role-select {
    position: relative; z-index: 1;
    display: flex; gap: 12px;
    margin-bottom: 28px;
  }
  .role-btn {
    padding: 10px 24px;
    border-radius: 6px;
    border: 2px solid var(--border);
    background: var(--card);
    color: var(--muted);
    font-family: 'Rajdhani', sans-serif;
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 2px;
    cursor: pointer;
    transition: all .25s;
    text-transform: uppercase;
  }
  .role-btn:hover { border-color: var(--purple); color: var(--text); }
  .role-btn.active-goat {
    border-color: var(--red);
    color: var(--red);
    box-shadow: var(--glow-r);
    background: #1a0710;
  }
  .role-btn.active-giver {
    border-color: var(--blue);
    color: var(--blue);
    box-shadow: var(--glow-b);
    background: #07101a;
  }

  /* Card */
  .card {
    position: relative; z-index: 1;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 36px 40px;
    width: min(420px, 92vw);
    box-shadow: 0 8px 60px #00000088, inset 0 1px 0 #ffffff0a;
  }
  .card-title {
    font-family: 'Rajdhani', sans-serif;
    font-size: 20px;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 28px;
    text-align: center;
  }
  .card-title span { color: var(--purple); }

  label {
    display: block;
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 7px;
    font-family: 'Rajdhani', sans-serif;
  }
  input {
    width: 100%;
    background: #0a0a18;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 16px;
    color: var(--text);
    font-family: 'Exo 2', sans-serif;
    font-size: 15px;
    margin-bottom: 20px;
    outline: none;
    transition: border-color .2s, box-shadow .2s;
  }
  input:focus {
    border-color: var(--purple);
    box-shadow: var(--glow-p);
  }

  .btn-login {
    width: 100%;
    padding: 14px;
    border: none;
    border-radius: 8px;
    background: linear-gradient(135deg, var(--purple), var(--blue));
    color: #fff;
    font-family: 'Orbitron', monospace;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 3px;
    cursor: pointer;
    transition: opacity .2s, transform .1s, box-shadow .2s;
    box-shadow: 0 4px 20px #7c3aed44;
    text-transform: uppercase;
  }
  .btn-login:hover { opacity:.9; box-shadow: 0 4px 30px #7c3aed88; }
  .btn-login:active { transform: scale(.98); }

  .error-msg {
    margin-top: 14px;
    padding: 10px 14px;
    border-radius: 6px;
    background: #2a0812;
    border: 1px solid var(--red);
    color: var(--red);
    font-size: 13px;
    text-align: center;
    display: none;
    font-family: 'Rajdhani', sans-serif;
    letter-spacing: 1px;
  }
  .error-msg.show { display: block; animation: shake .3s; }
  @keyframes shake {
    0%,100% { transform: translateX(0); }
    25%      { transform: translateX(-6px); }
    75%      { transform: translateX(6px); }
  }

  /* role hint */
  .hint {
    text-align: center;
    font-size: 12px;
    color: var(--muted);
    margin-top: 20px;
    font-family: 'Rajdhani', sans-serif;
    letter-spacing: 1px;
  }
  .hint b { color: var(--text); }
</style>
</head>
<body>
<div class="orb orb1"></div>
<div class="orb orb2"></div>
<div class="orb orb3"></div>

<div class="logo">
  <h1>LGPR STOCKS</h1>
  <p>Sailor Piece Stock Manager</p>
</div>

<div class="role-select">
  <button class="role-btn" id="btn-goat"  onclick="selectRole('goat')">👑 LGPR</button>
  <button class="role-btn" id="btn-giver" onclick="selectRole('stockgiver')">📦 Stock Givers</button>
</div>

<div class="card">
  <div class="card-title">Sign <span>In</span></div>
  <label>Username</label>
  <input type="text" id="uname" placeholder="Enter username" autocomplete="off"/>
  <label>Password</label>
  <input type="password" id="pass" placeholder="Enter password" onkeydown="if(event.key==='Enter')doLogin()"/>
  <button class="btn-login" onclick="doLogin()">ACCESS</button>
  <div class="error-msg" id="err">Invalid credentials or wrong role selected.</div>
  <p class="hint">Select your role above, then <b>log in</b>.</p>
</div>

<script src="auth.js"></script>
<script>
  let selectedRole = null;

  // If already logged in, redirect
  const existing = getSession();
  if (existing) {
    if (existing.role === 'goat') window.location.replace('dashboard-goat.html');
    else window.location.replace('dashboard-stockgivers.html');
  }

  function selectRole(role) {
    selectedRole = role;
    document.getElementById('btn-goat').className  = 'role-btn' + (role==='goat'?' active-goat':'');
    document.getElementById('btn-giver').className = 'role-btn' + (role==='stockgiver'?' active-giver':'');
  }

  function doLogin() {
    const u = document.getElementById('uname').value.trim();
    const p = document.getElementById('pass').value;
    const err = document.getElementById('err');
    err.classList.remove('show');

    if (!selectedRole) {
      err.textContent = 'Please select a role first (LGPR or Stock Givers).';
      err.classList.add('show'); return;
    }

    const user = login(u, p);
    if (!user) {
      err.textContent = 'Invalid credentials. Try again.';
      err.classList.add('show'); return;
    }
    if (user.role !== selectedRole) {
      err.textContent = 'Wrong role selected for this account.';
      err.classList.add('show'); return;
    }

    if (user.role === 'goat') window.location.replace('dashboard-goat.html');
    else window.location.replace('dashboard-stockgivers.html');
  }
</script>
</body>
</html>
