<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>LGPR STOCKS — Stock Givers</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&family=Orbitron:wght@700;900&family=Exo+2:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --blue:   #1e6fff;
    --purple: #7c3aed;
    --red:    #e11d48;
    --dark:   #07070f;
    --card:   #10101e;
    --card2:  #13132a;
    --border: #2a2a4a;
    --text:   #e8e8ff;
    --muted:  #7070a0;
    --green:  #22c55e;
    --glow-b: 0 0 18px #1e6fff66;
    --glow-p: 0 0 18px #7c3aed66;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--dark);
    color: var(--text);
    font-family: 'Exo 2', sans-serif;
    min-height: 100vh;
  }

  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image:
      linear-gradient(rgba(30,111,255,.05) 1px, transparent 1px),
      linear-gradient(90deg, rgba(30,111,255,.05) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none; z-index: 0;
  }

  nav {
    position: sticky; top: 0; z-index: 100;
    background: #0a0a18ee;
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 32px;
    height: 64px;
  }
  .nav-logo {
    font-family: 'Orbitron', monospace;
    font-size: 18px; font-weight: 900;
    letter-spacing: 3px;
    background: linear-gradient(90deg, var(--blue), var(--purple));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .nav-right { display:flex; align-items:center; gap:16px; }
  .nav-user {
    font-family: 'Rajdhani', sans-serif;
    font-size: 14px; letter-spacing: 2px;
    color: var(--muted);
    text-transform: uppercase;
  }
  .nav-user b { color: var(--blue); }
  .btn-logout {
    padding: 7px 18px;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: transparent;
    color: var(--muted);
    font-family: 'Rajdhani', sans-serif;
    font-size: 13px; font-weight: 700;
    letter-spacing: 2px;
    cursor: pointer;
    text-transform: uppercase;
    transition: all .2s;
  }
  .btn-logout:hover { border-color: var(--blue); color: var(--blue); }

  main {
    position: relative; z-index: 1;
    max-width: 1200px;
    margin: 0 auto;
    padding: 36px 24px 60px;
  }

  .page-header { margin-bottom: 32px; }
  .page-header h2 {
    font-family: 'Orbitron', monospace;
    font-size: 22px; font-weight: 900;
    letter-spacing: 3px;
  }
  .page-header p {
    color: var(--muted);
    font-size: 13px; letter-spacing: 1px;
    margin-top: 6px;
    font-family: 'Rajdhani', sans-serif;
  }

  /* Status */
  .status-bar {
    display: flex; align-items: center; gap: 12px;
    padding: 14px 20px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: var(--card2);
    margin-bottom: 32px;
    font-family: 'Rajdhani', sans-serif;
    font-size: 14px; letter-spacing: 1px;
  }
  .status-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .status-dot.live { background: var(--green); box-shadow: 0 0 10px #22c55e88; animation: pulse 2s infinite; }
  .status-dot.empty { background: var(--muted); }
  @keyframes pulse {
    0%,100% { box-shadow: 0 0 6px #22c55e88; }
    50%      { box-shadow: 0 0 18px #22c55ecc; }
  }

  /* Empty state */
  .empty-state {
    text-align: center;
    padding: 80px 20px;
    color: var(--muted);
  }
  .empty-state .big-icon { font-size: 64px; margin-bottom: 20px; opacity: .4; }
  .empty-state h3 {
    font-family: 'Orbitron', monospace;
    font-size: 18px; font-weight: 700;
    letter-spacing: 3px; margin-bottom: 10px;
    color: var(--text);
  }
  .empty-state p { font-family: 'Rajdhani', sans-serif; font-size: 14px; letter-spacing: 1px; }

  /* Grid */
  .items-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 20px;
  }

  .item-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    overflow: hidden;
    animation: fadeUp .4s ease both;
    transition: border-color .2s, box-shadow .2s, transform .2s;
  }
  .item-card:hover {
    border-color: var(--blue);
    box-shadow: var(--glow-b);
    transform: translateY(-3px);
  }
  @keyframes fadeUp {
    from { opacity:0; transform: translateY(16px); }
    to   { opacity:1; transform: translateY(0); }
  }

  .item-img {
    height: 160px;
    background: #0a0a1a;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
    position: relative;
  }
  .item-img img {
    width: 100%; height: 100%;
    object-fit: cover;
  }
  .item-img .no-img {
    display: flex; flex-direction: column; align-items: center; gap: 8px;
    color: var(--muted);
    font-family: 'Rajdhani', sans-serif;
    font-size: 11px; letter-spacing: 2px; text-transform: uppercase;
    opacity: .5;
  }

  .item-body { padding: 16px 18px 20px; }
  .item-label {
    font-family: 'Orbitron', monospace;
    font-size: 12px; font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text);
    margin-bottom: 14px;
  }

  .qty-display {
    display: flex; align-items: center; gap: 10px;
  }
  .qty-label {
    font-family: 'Rajdhani', sans-serif;
    font-size: 12px; letter-spacing: 2px;
    color: var(--muted); text-transform: uppercase;
  }
  .qty-val {
    font-family: 'Orbitron', monospace;
    font-size: 24px; font-weight: 900;
    color: var(--blue);
    line-height: 1;
    text-shadow: 0 0 14px #1e6fff88;
  }
  .qty-x {
    font-family: 'Rajdhani', sans-serif;
    font-size: 14px; color: var(--muted); letter-spacing: 1px;
  }

  /* refresh btn */
  .btn-refresh {
    padding: 8px 20px;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: transparent;
    color: var(--muted);
    font-family: 'Rajdhani', sans-serif;
    font-size: 13px; font-weight: 700; letter-spacing: 2px;
    cursor: pointer; text-transform: uppercase;
    transition: all .2s;
    margin-left: auto;
  }
  .btn-refresh:hover { border-color: var(--blue); color: var(--blue); }

  .published-at {
    font-family: 'Rajdhani', sans-serif;
    font-size: 12px; color: var(--muted); letter-spacing: 1px;
    margin-left: auto;
  }
</style>
</head>
<body>

<nav>
  <div class="nav-logo">LGPR STOCKS</div>
  <div class="nav-right">
    <div class="nav-user">Logged in as <b id="nav-name">—</b> &nbsp;📦</div>
    <button class="btn-logout" onclick="doLogout()">Logout</button>
  </div>
</nav>

<main>
  <div class="page-header">
    <h2>CURRENT STOCKS</h2>
    <p>Live drop quantities published by The Goat.</p>
  </div>

  <div class="status-bar">
    <div class="status-dot" id="status-dot"></div>
    <div class="status-text" id="status-text">Loading...</div>
    <span class="published-at" id="pub-at"></span>
    <button class="btn-refresh" onclick="loadStocks()">↻ REFRESH</button>
  </div>

  <div id="content"></div>
</main>

<script src="auth.js"></script>
<script>
  requireStockGiver();

  const session = getSession();
  document.getElementById('nav-name').textContent = session.username;

  function loadStocks() {
    const db = dbLoad();
    const dot  = document.getElementById('status-dot');
    const txt  = document.getElementById('status-text');
    const pubAt = document.getElementById('pub-at');
    const content = document.getElementById('content');

    if (!db.published) {
      dot.className = 'status-dot empty';
      txt.innerHTML = `<b style="color:var(--muted)">NOT LIVE</b> — The Goat hasn't published any stocks yet.`;
      pubAt.textContent = '';
      content.innerHTML = `
        <div class="empty-state">
          <div class="big-icon">📦</div>
          <h3>NO STOCKS YET</h3>
          <p>The Goat hasn't published any drops. Check back soon!</p>
        </div>`;
      return;
    }

    dot.className = 'status-dot live';
    txt.innerHTML = `<b style="color:#22c55e">LIVE</b> — The Goat's latest drops`;
    pubAt.textContent = `Updated: ${db.publishedAt || '—'}`;

    const grid = document.createElement('div');
    grid.className = 'items-grid';

    db.items.forEach((item, i) => {
      const card = document.createElement('div');
      card.className = 'item-card';
      card.style.animationDelay = `${i * 60}ms`;

      const imgHtml = item.img
        ? `<img src="${item.img}" alt="${item.label}">`
        : `<div class="no-img">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <rect x="3" y="3" width="18" height="18" rx="3"/>
              <circle cx="8.5" cy="8.5" r="1.5"/>
              <path d="m21 15-5-5L5 21"/>
            </svg>
            No image
           </div>`;

      card.innerHTML = `
        <div class="item-img">${imgHtml}</div>
        <div class="item-body">
          <div class="item-label">${item.label}</div>
          <div class="qty-display">
            <span class="qty-label">QTY</span>
            <span class="qty-val">${item.count}</span>
            <span class="qty-x">available</span>
          </div>
        </div>`;
      grid.appendChild(card);
    });

    content.innerHTML = '';
    content.appendChild(grid);
  }

  loadStocks();

  function doLogout() {
    clearSession();
    window.location.replace('login.html');
  }
</script>
</body>
</html>
